image: debian:bookworm-slim

variables:
  GIT_SUBMODULE_STRATEGY: recursive
  HUGO_VERSION: "0.160.1"

pages:
  before_script:
    - apt-get update -qq && apt-get install -y wget
    - wget -qO /tmp/hugo.deb "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
    - dpkg -i /tmp/hugo.deb
    - hugo version
  script:
    - hugo --minify --baseURL "https://md-ashraful-islam.gitlab.io/my_thoughts/"
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
